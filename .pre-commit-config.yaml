repos:
  # Базовые проверки
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  # Ruff - линтер и форматтер в одном
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4 # Используйте последнюю версию
    hooks:
      # Линтер (проверяет код)
      - id: ruff
        args: [--fix, --line-length=79]

      # Форматтер (автоматически форматирует)
      - id: ruff-format
        args: [--line-length=79]
